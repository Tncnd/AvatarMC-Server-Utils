plugins {
    id 'java'
}

group = 'dev.tuna'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    maven {
        name = 'papermc'
        url = 'https://repo.papermc.io/repository/maven-public/'
    }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:1.21.11-R0.1-SNAPSHOT'
}

// paper-api "Java 21 gerektiririm" der; bytecode'u 17 uretirken
// bagimlilik cozumunun 21 varyantini kabul etmesini sagla.
configurations.compileClasspath {
    attributes {
        attribute(org.gradle.api.attributes.java.TargetJvmVersion.TARGET_JVM_VERSION_ATTRIBUTE, 21)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    // Java 17 bytecode: 1.20.x sunuculari Java 17 ile calisabilir;
    // 26.x sunuculari (Java 25) geriye donuk uyumlu sekilde yukler.
    options.release = 21
}

jar {
    archiveBaseName = 'ElementBending'
}
